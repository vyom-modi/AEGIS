<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS — Dashboard</title>
    <meta name="description" content="AEGIS Autonomous Execution & Governance Intelligent System — Mission Dashboard">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@knadh/oat@latest/oat.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="logo">Δ</div>
                <h1>AEGIS</h1>
            </div>
            <nav>
                <a href="/" class="active">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/mission">
                    <span class="icon">🚀</span>
                    <span>Missions</span>
                </a>
                <a href="/tools">
                    <span class="icon">🔧</span>
                    <span>Tools</span>
                </a>
                <a href="/agents">
                    <span class="icon">🤖</span>
                    <span>Agents</span>
                </a>
                <a href="/skills">
                    <span class="icon">🧩</span>
                    <span>Skills</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Header -->
            <div class="page-header">
                <h2>Dashboard</h2>
                <p>Overview of your autonomous missions and system health.</p>
            </div>

            <!-- Metric Cards -->
            <div class="card-grid" id="metrics-cards">
                <div class="card">
                    <div class="card-header"><span class="card-title">Total Goals</span></div>
                    <div class="card-value">—</div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">Active Missions</span></div>
                    <div class="card-value success">—</div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">Completed</span></div>
                    <div class="card-value">—</div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">Success Rate</span></div>
                    <div class="card-value success">—</div>
                </div>
            </div>

            <!-- Goals Section -->
            <div class="section">
                <div class="section-title" style="justify-content: space-between;">
                    <span>🎯 Goals</span>
                    <button class="btn btn-primary btn-sm" onclick="openModal('create-goal-modal')">
                        + New Goal
                    </button>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="goals-list">
                        <tr>
                            <td colspan="4" class="empty-state" style="padding:2rem">
                                Loading goals...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <!-- Create Goal Modal -->
    <div id="create-goal-modal" class="modal-backdrop">
        <div class="modal">
            <h3>Create New Goal</h3>
            <form onsubmit="createGoal(event)">
                <div class="form-group">
                    <label for="goal-title">Title</label>
                    <input type="text" id="goal-title" placeholder="e.g., Track GPU prices weekly" required>
                </div>
                <div class="form-group">
                    <label for="goal-description">Description</label>
                    <textarea id="goal-description" placeholder="Describe what the system should accomplish..."
                        required></textarea>
                </div>
                <div class="form-group">
                    <label for="goal-schedule">Schedule (optional)</label>
                    <input type="text" id="goal-schedule" placeholder="e.g., weekly, daily, once">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('create-goal-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Goal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@knadh/oat@latest/oat.min.js"></script>
    <script src="/static/main.js"></script>
</body>

</html>
